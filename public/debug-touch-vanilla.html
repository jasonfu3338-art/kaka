<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Vanilla Touch Debug</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #ffffff;
        color: #020617;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        min-height: 100dvh;
        padding: 20px 20px 140px;
      }

      button,
      .zone {
        border: 0;
        border-radius: 12px;
        font: inherit;
        font-weight: 800;
      }

      button {
        background: #020617;
        color: #ffffff;
        padding: 16px 20px;
      }

      .zone {
        margin-top: 20px;
        border: 2px solid #2563eb;
        background: #eff6ff;
        padding: 26px;
      }

      .zone.pointer {
        border-color: #9333ea;
        background: #faf5ff;
      }

      pre {
        min-height: 180px;
        margin-top: 20px;
        white-space: pre-wrap;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #f8fafc;
        padding: 16px;
        font-size: 14px;
      }

      #fixed {
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: calc(16px + env(safe-area-inset-bottom));
        z-index: 2147483647;
        background: #fde047;
        color: #020617;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vanilla Touch Debug</h1>
      <button id="normal" type="button">普通 button</button>
      <div id="touch-zone" class="zone">touchstart 测试区</div>
      <div id="pointer-zone" class="zone pointer">pointerdown 测试区</div>
      <pre id="debug">inline script: not run</pre>
    </main>

    <button id="fixed" type="button">fixed bottom button</button>

    <script>
      (function () {
        var debug = document.getElementById("debug");

        function describe(element) {
          if (!element) return "none";
          var id = element.id ? "#" + element.id : "";
          var className = element.className && typeof element.className === "string" ? "." + element.className.split(/\s+/).slice(0, 4).join(".") : "";
          var text = element.textContent ? element.textContent.trim().replace(/\s+/g, " ").slice(0, 40) : "";
          return element.tagName.toLowerCase() + id + className + (text ? ' "' + text + '"' : "");
        }

        function pointFromEvent(event) {
          if (event.touches && event.touches.length) {
            return { x: event.touches[0].clientX, y: event.touches[0].clientY };
          }

          if (event.changedTouches && event.changedTouches.length) {
            return { x: event.changedTouches[0].clientX, y: event.changedTouches[0].clientY };
          }

          if (typeof event.clientX === "number") {
            return { x: event.clientX, y: event.clientY };
          }

          return null;
        }

        function record(label, event) {
          var point = pointFromEvent(event);
          var topElement = point ? document.elementFromPoint(point.x, point.y) : null;
          debug.textContent = [
            label + " fired",
            "event type: " + event.type,
            "event target: " + describe(event.target),
            "elementFromPoint: " + describe(topElement),
            point ? "point: " + Math.round(point.x) + ", " + Math.round(point.y) : "point: none",
            "time: " + new Date().toLocaleTimeString(),
          ].join("\n");
        }

        debug.textContent = "inline script: ran\nwaiting";

        document.addEventListener(
          "touchstart",
          function (event) {
            record("document capture touchstart", event);
          },
          true,
        );
        document.addEventListener(
          "pointerdown",
          function (event) {
            record("document capture pointerdown", event);
          },
          true,
        );
        document.addEventListener(
          "click",
          function (event) {
            record("document capture click", event);
          },
          true,
        );

        document.getElementById("normal").addEventListener("click", function (event) {
          record("normal click", event);
        });
        document.getElementById("touch-zone").addEventListener("touchstart", function (event) {
          record("zone touchstart", event);
        });
        document.getElementById("pointer-zone").addEventListener("pointerdown", function (event) {
          record("zone pointerdown", event);
        });
        document.getElementById("fixed").addEventListener("touchstart", function (event) {
          record("fixed touchstart", event);
        });
        document.getElementById("fixed").addEventListener("pointerdown", function (event) {
          record("fixed pointerdown", event);
        });
        document.getElementById("fixed").addEventListener("click", function (event) {
          record("fixed click", event);
        });
      })();
    </script>
  </body>
</html>
